<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0079C1" />
  <meta name="description" content="Smart Maidani — field GIS data collection. Build your own feature-class layers, define attributes, capture point/line/polygon with auto Z-elevation, symbolize, choose coordinate systems, export GeoJSON/KML/Shapefile/CSV." />
  <title>Smart Maidani</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
  <div id="app">
    <div id="map"></div>

    <!-- Tap-to-place hint (points place instantly on tap, no confirm step) -->
    <div class="tap-hint" id="tapHint">
      <span id="tapHintText">Tap the map to place the point</span>
      <button id="tapHintCancel" aria-label="Cancel"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
    </div>

    <!-- Drop-pin animation shown at the exact tapped coordinate -->
    <div class="drop-pin-layer" id="dropPinLayer"></div>

    <div class="gps-pill" id="gpsPill"><span class="d" id="gpsDot"></span><span id="gpsAccTxt">±— m</span><span class="hdg" id="gpsHdgWrap" style="display:none"><svg viewBox="0 0 24 24" id="gpsHdgArrow" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg><span id="gpsSpeedTxt"></span></span></div>

    <header class="appbar">
      <div class="brand">
        <div class="mark" id="logoMark"></div>
        <div class="titles"><div class="proj" id="barProj">Smart Maidani</div><div class="sub" id="barSub">Register to begin</div></div>
      </div>
      <div class="spacer"></div>
      <div class="net online" id="net"><span class="d"></span><span id="netTxt">Online</span></div>
      <button class="bar-btn" id="menuBtn" aria-label="Menu"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg></button>
    </header>

    <div class="map-ctrls right">
      <div class="zoom-cluster">
        <button class="fab zoom" id="zoomIn" aria-label="Zoom in"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg></button>
        <button class="fab zoom" id="zoomOut" aria-label="Zoom out"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 12h14"/></svg></button>
      </div>
      <button class="fab" id="layersBtn" aria-label="Layers"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 2 10 5-10 5L2 7z"/><path d="m2 12 10 5 10-5M2 17l10 5 10-5"/></svg></button>
      <button class="fab locate" id="locateBtn" aria-label="Locate me"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="8"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/><circle cx="12" cy="12" r="2.5" fill="currentColor"/></svg></button>
    </div>

    <button class="fab basemap-fab" id="basemapBtn" aria-label="Basemap"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18-6 3V6l6-3 6 3 6-3v15l-6 3z"/><path d="M9 3v15M15 6v15"/></svg></button>
    <div class="basemap-panel" id="basemapPanel">
      <button class="bm-opt" data-bm="satellite"><div class="thumb bm-sat"></div><div class="nm">Satellite</div></button>
      <button class="bm-opt" data-bm="streets"><div class="thumb bm-str"></div><div class="nm">Streets</div></button>
      <button class="bm-opt" data-bm="topographic"><div class="thumb bm-topo"></div><div class="nm">Topographic</div></button>
    </div>

    <!-- Sketch bar — line/polygon drawing only. Tap to add vertices; Finish or double-tap to complete. -->
    <div class="sketch-bar" id="sketchBar">
      <button class="sk-btn" id="skCancel" aria-label="Cancel sketch"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
      <div class="sk-info"><span id="sketchCount">0 points</span><span class="sk-hint">tap map to add · double-tap to finish</span></div>
      <button class="sk-btn" id="skUndo" aria-label="Undo last point"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 14 4 9l5-5"/><path d="M4 9h10.5a5.5 5.5 0 0 1 0 11H11"/></svg></button>
      <button class="sk-finish" id="skFinish"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M20 6 9 17l-5-5"/></svg>Finish</button>
    </div>

    <div class="collect" id="collectBar">
      <div class="nav-pill">
        <button data-nav="list" id="navList"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>Records</button>
        <button data-nav="export" id="navExport"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg>Export</button>
      </div>
      <button class="collect-btn" id="collectBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>Collect</button>
    </div>

    <div class="scrim" id="scrim"></div>
    <div class="sheet" id="sheet">
      <div class="sheet-grip"></div>
      <div class="sheet-head"><button class="close" id="sheetBack" style="display:none"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg></button><h2 id="sheetTitle">Sheet</h2><button class="close" id="sheetClose"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg></button></div>
      <div class="sheet-body" id="sheetBody"></div>
      <div class="sheet-foot" id="sheetFoot" style="display:none"></div>
    </div>

    <div class="toast-wrap" id="toastWrap"></div>

    <!-- In-app camera — live preview, auto-saves each capture, no extra confirm step -->
    <div class="camera-view" id="cameraView">
      <video id="camVideo" autoplay playsinline muted></video>
      <canvas id="camCanvas" style="display:none"></canvas>
      <div class="cam-top">
        <button class="cam-icon-btn" id="camClose"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
        <div class="cam-rec-timer" id="camTimer" style="display:none"><span class="dot"></span><span id="camTimerTxt">0:00</span></div>
        <button class="cam-icon-btn" id="camSwitch"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 0 0-9-9 9 9 0 0 0-6.7 3M3 12a9 9 0 0 0 9 9 9 9 0 0 0 6.7-3"/><path d="M21 3v6h-6M3 21v-6h6"/></svg></button>
      </div>
      <div class="cam-bottom">
        <div class="cam-thumbs" id="camThumbs"></div>
        <button class="cam-shutter" id="camShutter"><span class="ring"></span></button>
        <button class="cam-done" id="camDone">Done</button>
      </div>
      <div class="cam-error" id="camError" style="display:none">
        <svg viewBox="0 0 24 24" width="40" height="40" fill="none" stroke="#fff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/><path d="M2 2l20 20" stroke="#E14B3B"/></svg>
        <div class="t">Camera access needed</div>
        <div class="d" id="camErrorMsg">Allow camera access in your browser to take photos.</div>
        <button class="btn btn-primary" id="camRetry">Try again</button>
        <button class="btn-text" id="camUseFile">Upload a file instead</button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.11.0/proj4.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shpwrite/0.3.2/shpwrite.js"></script>
  <script src="js/icons.js"></script>
  <script src="js/db.js"></script>
  <script src="js/geo.js"></script>
  <script src="js/export.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.getElementById('logoMark').innerHTML = LOGO(30);
    if ('serviceWorker' in navigator) window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
  </script>
</body>
</html>
